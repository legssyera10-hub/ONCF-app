version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oncf_demo
      POSTGRES_USER: oncf
      POSTGRES_PASSWORD: oncf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://oncf:oncf@postgres:5432/oncf_demo
      JWT_SECRET_KEY: change-me-in-dev
      CORS_ORIGINS: http://localhost:5173,http://frontend:5173
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:

